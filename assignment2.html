<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laundry Services</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", sans-serif;
}

body{
height:100vh;
background:#f6f7fb;
}

/* Navbar */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
}

.logo{
font-size:22px;
font-weight:600;
color:#333;
}

.menu{
display:flex;
gap:40px;
list-style:none;
}

.menu a{
text-decoration:none;
color:#6c757d;
font-size:16px;
}

.menu a:hover{
color:#000;
}

.username{
background:#d9f0ff;
color:#3b82f6;
padding:8px 16px;
border-radius:20px;
font-size:14px;
}

/* Hero Section */

.hero{
height:90vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 80px;
}

/* Left Side */

.hero-text{
width:50%;
}

.hero-text h1{
font-size:48px;
line-height:1.3;
color:#2d3748;
margin-bottom:20px;
}

.hero-text span{
color:#1da1f2;
}

.hero-text p{
font-size:16px;
color:#6b7280;
line-height:1.7;
width:85%;
margin-bottom:30px;
}

.btn{
background:#1da1f2;
color:white;
border:none;
padding:14px 30px;
border-radius:10px;
font-size:16px;
cursor:pointer;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

.btn:hover{
background:#0d8ce0;
}

/* Right Side */

.hero-image{
width:50%;
display:flex;
justify-content:center;
}

.hero-image img{
width:420px;
}

</style>
</head>

<body>

<!-- Navbar -->

<nav class="navbar">

<div class="logo">Logo</div>

<ul class="menu">
<li><a href="#">Home</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">About Us</a></li>
<li><a href="#">Contact Us</a></li>
</ul>

<div class="username">Username</div>

</nav>


<!-- Hero Section -->

<section class="hero">

<div class="hero-text">

<h1>
Revitalize Your Clothes with Expert
<span>Laundry Services!</span>
</h1>

<p>
From premium dry cleaning to swift wash and fold, we deliver care and convenience.
Schedule a pickup and rediscover the freshness of your clothes today!
</p>

<button class="btn">Book a service today!</button>

</div>


<div class="hero-image">

<img src="https://cdn-icons-png.flaticon.com/512/2936/2936886.png">

</div>

</section>

</body>
</html>
